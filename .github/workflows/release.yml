name: Build and release traffic ZIP

on:
  push:
    tags:
      - 'v*-traffic'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build installable ZIP
        run: |
          TAG=${GITHUB_REF_NAME}
          ZIPNAME="Advanced.Gamepad.Assist.Traffic.Build.${TAG}.zip"
          # Put apps/ and extension/ at ZIP root so CM auto-detects the structure.
          # Then add manifest and readme at root alongside them.
          pushd "Advanced Gamepad Assist"
          zip -r "../$ZIPNAME" apps/ extension/
          popd
          zip "$ZIPNAME" cm_manifest.json INSTALL-TRAFFIC-BUILD.md
      - name: Attach ZIP to release
        uses: softprops/action-gh-release@v2
        with:
          files: Advanced.Gamepad.Assist.Traffic.Build.*.zip
          fail_on_unmatched_files: true
